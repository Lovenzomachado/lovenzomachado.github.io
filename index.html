<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <title>Shockwave Ripple Slider | Perfect Wave Timing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'New Montreal', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f0eb;
            overflow: hidden;
        }

        .slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            overflow: hidden;
            cursor: pointer;
            transition: background-color 1.5s ease;
        }

        .slider canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: difference;
            color: white;
            user-select: none;
        }

        .slide-title {
            position: absolute;
            left: 6%;
            top: 50%;
            transform: translateY(-50%);
            width: max-content;
            max-width: 40%;
        }

        .slide-title h1 {
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: white;
            margin: 0;
        }

        .slide-description {
            position: absolute;
            right: 6%;
            top: 50%;
            transform: translateY(-50%);
            width: 28%;
            min-width: 260px;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .slide-description p {
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: white;
            margin: 0;
        }

        .char, .line {
            display: inline-block;
            will-change: transform, opacity;
            position: relative;
        }

        @media (max-width: 768px) {
            .slide-title {
                left: 50%;
                transform: translate(-50%, -50%);
                text-align: center;
                width: 90%;
                max-width: 90%;
            }
            .slide-description {
                right: 50%;
                transform: translateX(50%);
                top: auto;
                bottom: 12%;
                width: 80%;
                text-align: center;
                min-width: auto;
            }
        }

        /* ===== MENU STYLES ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.8rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
            background: transparent;
            mix-blend-mode: difference;
            pointer-events: auto;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: white;
        }

        .menu-toggle {
            width: 90px;
            height: 32px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .toggle-label {
            position: absolute;
            font-weight: 500;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            will-change: transform, opacity;
            color: white;
        }

        #menuLabel {
            opacity: 1;
            transform: translateY(0) rotate(0deg);
        }

        #closeLabel {
            opacity: 0;
            transform: translateY(6px) rotate(-5deg);
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #030303;
            z-index: 100;
            clip-path: polygon(0% 0%, 0% 0%, 0% 0%, 0% 0%);
            pointer-events: none;
            will-change: clip-path;
        }

        .menu-overlay.active {
            pointer-events: auto;
        }

        .menu-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 6rem 3rem 3rem 3rem;
            transform-origin: bottom left;
            will-change: transform, opacity;
            opacity: 0;
            transform: translateY(40px) rotateX(6deg) scale(0.98);
        }

        .menu-items {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            width: 100%;
            margin-bottom: 3rem;
        }

        .col-large {
            flex: 3;
            min-width: 200px;
        }

        .col-small {
            flex: 2;
            min-width: 180px;
        }

        .preview-container {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 4 / 3;
            background: #1a1a1a;
            overflow: hidden;
            position: relative;
            border-radius: 18px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }

        .preview-inner {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .preview-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            will-change: transform, opacity;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 3rem;
        }

        .link {
            padding: 0.2rem 0;
            clip-path: inset(0 0 0 0);
        }

        .link a {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #aaaaaa;
            transition: color 0.25s ease;
            display: inline-block;
            will-change: transform, opacity;
        }

        .link a:hover {
            color: #ffffff;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social a {
            font-size: 1rem;
            color: #6a6a6a;
            transition: color 0.2s;
            letter-spacing: 0.3px;
        }

        .social a:hover {
            color: #ffffff;
        }

        .menu-footer {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 2rem;
            margin-top: 1rem;
        }

        .footer-col {
            flex: 1;
            display: flex;
            gap: 2rem;
        }

        .footer-col a {
            font-size: 0.85rem;
            color: #888;
            transition: color 0.2s;
            text-decoration: none;
        }

        .footer-col a:hover {
            color: white;
        }

        .link a, .social a {
            opacity: 0;
            transform: translateY(120%);
            display: inline-block;
            will-change: transform, opacity;
        }

        @media (max-width: 900px) {
            .menu-content {
                padding: 5rem 1.8rem 2rem 1.8rem;
            }
            .col-large {
                display: none;
            }
            .menu-items {
                gap: 1rem;
            }
            .col-small {
                flex: 1;
            }
            .link a {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="logo">✦ NEBULA</div>
    <div class="menu-toggle" id="menuToggle">
        <span class="toggle-label" id="menuLabel">MENU</span>
        <span class="toggle-label" id="closeLabel">CLOSE</span>
    </div>
</div>

<div class="menu-overlay" id="menuOverlay">
    <div class="menu-content" id="menuContent">
        <div class="menu-items">
            <div class="col-large">
                <div class="preview-container">
                    <div class="preview-inner" id="previewInner">
                        <img class="preview-img" src="https://images.unsplash.com/photo-1535378917042-10a22c959e8a?q=80&w=1974&auto=format" alt="preview default">
                    </div>
                </div>

                <div class="menu-links">
                    <div class="link"><a href="#" data-image="https://images.unsplash.com/photo-1554080353-a576cf803bda?q=80&w=1974&auto=format" class="animated-underline">WORK</a></div>
                    <div class="link"><a href="#" data-image="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?q=80&w=2070&auto=format" class="animated-underline">STUDIO</a></div>
                    <div class="link"><a href="#" data-image="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2070&auto=format" class="animated-underline">EXPERTISE</a></div>

</div>

<div class="slider" id="slider"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    const slidesData = [
        {
            title: "Blackwater '91",
            description: "Flickering lanterns and twisted masks welcome unwanted visitors into a strange celebration beyond the forest trail.",
            image: "https://picsum.photos/id/104/800/800",
            bgColor: "#1a1a1a"
        },
        {
            title: "Neon Reverie",
            description: "Electric dreams pulse through rain-soaked streets, where reality bends like light through water.",
            image: "https://picsum.photos/id/106/800/800",
            bgColor: "#0d1f2d"
        },
        {
            title: "Silent Echoes",
            description: "Mountains hold secrets in their peaks, whispered only to those who dare to listen.",
            image: "https://picsum.photos/id/124/800/800",
            bgColor: "#2c3e50"
        },
        {
            title: "Horizon Drift",
            description: "Where the sky melts into the sea, boundaries dissolve like morning mist.",
            image: "https://picsum.photos/id/169/800/800",
            bgColor: "#4a6741"
        }
    ];

    let currentIndex = 0;
    let isTransitioning = false;
    let rippleTween = null;
    
    let scene, camera, renderer, shaderMaterial;
    let textures = [];
    let uniforms;
    
    const sliderEl = document.getElementById('slider');

    // ========== SHADER - ONDA QUE ZERA NO FINAL ==========
    const vertexShader = `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `;

    const fragmentShader = `
        uniform sampler2D u_textureA;
        uniform sampler2D u_textureB;
        uniform float u_progress;
        uniform vec2 u_resolution;
        uniform float u_mobile;
        
        varying vec2 vUv;
        
        void main() {
            vec2 res = u_resolution;
            float aspect = res.x / res.y;
            
            float containerSize = u_mobile > 0.5 ? 1.0 : 0.42;
            float containerWidth = containerSize;
            float containerHeight = containerSize;
            
            float offsetX = (1.0 - containerWidth) * 0.5;
            float offsetY = (1.0 - containerHeight) * 0.5;
            
            vec2 centered = vUv * 2.0 - 1.0;
            centered.x *= aspect;
            float radius = length(centered);
            float maxRadius = length(vec2(aspect, 1.0));
            float normRad = radius / maxRadius;
            
            float wavePos = u_progress;
            
            float distortion = 0.0;
            float waveWidth = u_mobile > 0.5 ? 0.4 : 0.26;
            float waveStart = wavePos - waveWidth;
            float waveEnd = wavePos;
            
            if (normRad > waveStart && normRad < waveEnd) {
                float t = (normRad - waveStart) / waveWidth;
                t = 1.0 - t;
                distortion = sin(t * 3.14159);
                // Intensidade reduzida conforme progresso avança
                // Quando progresso chega a 1.0, distortion vira 0
                float intensity = 0.045 * (1.0 - wavePos * 0.7);
                distortion = distortion * intensity;
            }
            
            vec2 radialDir = normalize(centered);
            if (radius < 0.01) radialDir = vec2(0.0);
            
            vec2 distortedUv = vUv + radialDir * distortion;
            distortedUv = clamp(distortedUv, 0.001, 0.999);
            
            bool insideImage = (distortedUv.x >= offsetX && distortedUv.x <= offsetX + containerWidth &&
                               distortedUv.y >= offsetY && distortedUv.y <= offsetY + containerHeight);
            
            if (!insideImage) {
                gl_FragColor = vec4(0.0, 0.0, 0.0, 0.0);
                return;
            }
            
            vec2 imageUV = vec2(
                (distortedUv.x - offsetX) / containerWidth,
                (distortedUv.y - offsetY) / containerHeight
            );
            imageUV = clamp(imageUV, 0.001, 0.999);
            
            vec4 texA = texture2D(u_textureA, imageUV);
            vec4 texB = texture2D(u_textureB, imageUV);
            
            float mixFactor = smoothstep(0.0, 1.0, u_progress);
            vec4 color = mix(texA, texB, mixFactor);
            
            gl_FragColor = color;
        }
    `;

    // ========== FUNÇÕES DE TEXTO ==========
    function splitTextManual(element, isTitle) {
        const text = element.innerText;
        
        if (isTitle) {
            const wrapper = document.createElement('span');
            wrapper.style.display = 'block';
            
            const chars = text.split('');
            chars.forEach(char => {
                const charSpan = document.createElement('span');
                charSpan.className = 'char';
                charSpan.textContent = char === ' ' ? '\u00A0' : char;
                charSpan.style.display = 'inline-block';
                wrapper.appendChild(charSpan);
            });
            
            element.innerHTML = '';
            element.appendChild(wrapper);
            return Array.from(wrapper.querySelectorAll('.char'));
        } else {
            const wrapper = document.createElement('div');
            wrapper.style.display = 'block';
            
            const lines = [text];
            lines.forEach(line => {
                const lineSpan = document.createElement('span');
                lineSpan.className = 'line';
                lineSpan.textContent = line;
                lineSpan.style.display = 'block';
                wrapper.appendChild(lineSpan);
            });
            
            element.innerHTML = '';
            element.appendChild(wrapper);
            return Array.from(wrapper.querySelectorAll('.line'));
        }
    }
    
    function animateTextOut(container, onComplete) {
        const titleH1 = container.querySelector('.slide-title h1');
        const descP = container.querySelector('.slide-description p');
        let completed = 0;
        let total = 0;
        
        const done = () => { completed++; if (completed === total) onComplete(); };
        
        if (titleH1) {
            const chars = titleH1.querySelectorAll('.char');
            if (chars.length) {
                total++;
                gsap.to(chars, {
                    y: -40,
                    opacity: 0,
                    stagger: 0.012,
                    duration: 0.4,
                    ease: "power3.in",
                    onComplete: done
                });
            } else { done(); }
        } else { done(); }
        
        if (descP) {
            const lines = descP.querySelectorAll('.line');
            if (lines.length) {
                total++;
                gsap.to(lines, {
                    y: -30,
                    opacity: 0,
                    stagger: 0.018,
                    duration: 0.35,
                    ease: "power2.in",
                    onComplete: done
                });
            } else { done(); }
        }
        
        if (total === 0) onComplete();
    }
    
    function animateTextIn(container, onComplete) {
        container.style.opacity = '1';
        const titleH1 = container.querySelector('.slide-title h1');
        const descP = container.querySelector('.slide-description p');
        let completed = 0;
        let total = 0;
        
        const done = () => { completed++; if (completed === total) onComplete(); };
        
        if (titleH1) {
            const chars = titleH1.querySelectorAll('.char');
            if (chars.length) {
                total++;
                gsap.set(chars, { y: 50, opacity: 0 });
                gsap.to(chars, {
                    y: 0,
                    opacity: 1,
                    stagger: 0.018,
                    duration: 0.6,
                    ease: "back.out(0.5)",
                    onComplete: done
                });
            } else { done(); }
        } else { done(); }
        
        if (descP) {
            const lines = descP.querySelectorAll('.line');
            if (lines.length) {
                total++;
                gsap.set(lines, { y: 35, opacity: 0 });
                gsap.to(lines, {
                    y: 0,
                    opacity: 1,
                    stagger: 0.025,
                    duration: 0.55,
                    ease: "power3.out",
                    onComplete: done
                });
            } else { done(); }
        }
        
        if (total === 0) onComplete();
    }
    
    function createSlideElement(index) {
        const data = slidesData[index];
        const div = document.createElement('div');
        div.className = 'slide-content';
        div.style.opacity = '0';
        
        const titleDiv = document.createElement('div');
        titleDiv.className = 'slide-title';
        const h1 = document.createElement('h1');
        h1.textContent = data.title;
        titleDiv.appendChild(h1);
        
        const descDiv = document.createElement('div');
        descDiv.className = 'slide-description';
        const p = document.createElement('p');
        p.textContent = data.description;
        descDiv.appendChild(p);
        
        div.appendChild(titleDiv);
        div.appendChild(descDiv);
        
        splitTextManual(h1, true);
        splitTextManual(p, false);
        
        return div;
    }
    
    function getCurrentSlide() {
        const children = sliderEl.querySelectorAll('.slide-content');
        for (let child of children) {
            if (child.parentNode === sliderEl && parseFloat(getComputedStyle(child).opacity) > 0.5) {
                return child;
            }
        }
        return null;
    }
    
    function transitionToNext() {
        if (isTransitioning) return;
        isTransitioning = true;
        
        if (rippleTween) rippleTween.kill();
        
        const nextIndex = (currentIndex + 1) % slidesData.length;
        
        uniforms.u_textureA.value = textures[currentIndex];
        uniforms.u_textureB.value = textures[nextIndex];
        uniforms.u_progress.value = 0;
        
        const oldSlide = getCurrentSlide();
        
        if (oldSlide) {
            animateTextOut(oldSlide, () => {
                if (oldSlide && oldSlide.parentNode) oldSlide.remove();
            });
        }
        
        const newSlide = createSlideElement(nextIndex);
        sliderEl.appendChild(newSlide);
        
        // Troca a cor de fundo instantaneamente
        sliderEl.style.backgroundColor = slidesData[nextIndex].bgColor;
        
        // ===== ANIMAÇÃO DA ONDA COM TIMING PERFEITO =====
        // No mobile: animação única e suave
        // No desktop: duas fases (lenta depois rápida)
        
        const isMobile = window.innerWidth < 768;
        
        if (isMobile) {
            // Mobile: animação única suave, sem delay
            rippleTween = gsap.to(uniforms.u_progress, {
                value: 1.0,
                duration: 1.8,
                ease: "power2.out",
                onComplete: () => {
                    uniforms.u_textureA.value = textures[nextIndex];
                    currentIndex = nextIndex;
                    isTransitioning = false;
                    rippleTween = null;
                }
            });
        } else {
            // Desktop: duas fases
            const slowDuration = 1.2;
            const fastDuration = 0.5;
            
            const firstPhase = gsap.to(uniforms.u_progress, {
                value: 0.7,
                duration: slowDuration,
                ease: "power2.out",
                paused: true
            });
            
            const secondPhase = gsap.to(uniforms.u_progress, {
                value: 1.0,
                duration: fastDuration,
                ease: "power1.out",
                paused: true,
                onComplete: () => {
                    uniforms.u_textureA.value = textures[nextIndex];
                    currentIndex = nextIndex;
                    isTransitioning = false;
                    rippleTween = null;
                }
            });
            
            firstPhase.play();
            firstPhase.eventCallback("onComplete", () => {
                secondPhase.play();
            });
            
            rippleTween = { kill: () => {
                firstPhase.kill();
                secondPhase.kill();
            }};
        }
        
        const textDelay = isMobile ? 1500 : 900;
        setTimeout(() => {
            if (newSlide && newSlide.parentNode) {
                animateTextIn(newSlide, () => {});
            }
        }, textDelay);
    }
    
    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        sliderEl.prepend(renderer.domElement);
        
        const isMobile = window.innerWidth < 768;
        
        uniforms = {
            u_textureA: { value: null },
            u_textureB: { value: null },
            u_progress: { value: 0 },
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            u_mobile: { value: isMobile ? 1.0 : 0.0 }
        };
        
        shaderMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true
        });
        
        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, shaderMaterial);
        scene.add(mesh);
        
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            uniforms.u_mobile.value = window.innerWidth < 768 ? 1.0 : 0.0;
        });
    }
    
    async function loadTextures() {
        const loader = new THREE.TextureLoader();
        const promises = slidesData.map((slide, idx) => {
            return new Promise((resolve) => {
                loader.load(slide.image, (tex) => {
                    tex.wrapS = THREE.ClampToEdgeWrapping;
                    tex.wrapT = THREE.ClampToEdgeWrapping;
                    tex.minFilter = THREE.LinearFilter;
                    textures[idx] = tex;
                    resolve();
                }, undefined, () => {
                    loader.load('https://picsum.photos/id/100/800/800', (fallback) => {
                        textures[idx] = fallback;
                        resolve();
                    });
                });
            });
        });
        await Promise.all(promises);
    }
    
    function startIntro() {
        const firstSlide = createSlideElement(0);
        sliderEl.appendChild(firstSlide);
        
        sliderEl.style.backgroundColor = slidesData[0].bgColor;
        
        uniforms.u_textureA.value = textures[0];
        uniforms.u_textureB.value = textures[0];
        
        animateTextIn(firstSlide, () => {});
    }
    
    async function bootstrap() {
        initThree();
        await loadTextures();
        startIntro();
        
        sliderEl.addEventListener('click', (e) => {
            if (e.target.closest('.navbar') || e.target.closest('.menu-overlay')) return;
            if (!isTransitioning) transitionToNext();
        });
        
        function render() {
            requestAnimationFrame(render);
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        render();
    }
    
    bootstrap();
</script>

<script>
    (function() {
        const siteContainer = document.querySelector('.slider');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuContent = document.getElementById('menuContent');
        const menuToggle = document.getElementById('menuToggle');
        const menuLinks = document.querySelectorAll('.link a');
        const socialLinks = document.querySelectorAll('.social a');
        const previewInner = document.getElementById('previewInner');
        
        let isOpen = false;
        let isAnimating = false;
        
        const defaultImage = "https://images.unsplash.com/photo-1535378917042-10a22c959e8a?q=80&w=1974&auto=format";
        
        function cleanupPreviewImages() {
            const images = document.querySelectorAll('#previewInner .preview-img');
            if (images.length > 3) {
                const excess = images.length - 3;
                for (let i = 0; i < excess; i++) {
                    if (images[i] && images[i].parentNode) images[i].remove();
                }
            }
        }
        
        function resetPreviewImage() {
            const allImgs = document.querySelectorAll('#previewInner .preview-img');
            allImgs.forEach(img => img.remove());
            const newImg = document.createElement('img');
            newImg.classList.add('preview-img');
            newImg.src = defaultImage;
            newImg.style.opacity = '1';
            newImg.style.transform = 'scale(1) rotate(0deg)';
            previewInner.appendChild(newImg);
        }
        
        function animateMenuToggle(isOpening) {
            const menuLabel = document.getElementById('menuLabel');
            const closeLabel = document.getElementById('closeLabel');
            if (!menuLabel || !closeLabel) return;
            
            if (isOpening) {
                gsap.to(menuLabel, {
                    duration: 0.4, y: -8, opacity: 0, rotation: -6,
                    ease: "power2.in",
                    onComplete: () => gsap.set(menuLabel, { visibility: 'hidden' })
                });
                gsap.set(closeLabel, { visibility: 'visible', y: 10, opacity: 0, rotation: 4 });
                gsap.to(closeLabel, {
                    duration: 0.5, y: 0, opacity: 1, rotation: 0, delay: 0.2, ease: "back.out(0.6)"
                });
            } else {
                gsap.to(closeLabel, {
                    duration: 0.4, y: 8, opacity: 0, rotation: 5,
                    ease: "power2.in",
                    onComplete: () => gsap.set(closeLabel, { visibility: 'hidden' })
                });
                gsap.set(menuLabel, { visibility: 'visible', y: -10, opacity: 0, rotation: -4 });
                gsap.to(menuLabel, {
                    duration: 0.5, y: 0, opacity: 1, rotation: 0, delay: 0.2, ease: "back.out(0.6)"
                });
            }
        }
        
        function setLinksHiddenState(hidden) {
            const allLinkAnchors = [...menuLinks, ...socialLinks];
            if (hidden) gsap.set(allLinkAnchors, { opacity: 0, y: '120%' });
        }
        
        setLinksHiddenState(true);
        gsap.set(menuContent, { opacity: 0, y: 40, rotationX: 6, scale: 0.98 });
        gsap.set(menuOverlay, { clipPath: "polygon(0% 0%, 0% 0%, 0% 0%, 0% 0%)" });
        menuOverlay.style.pointerEvents = "none";
        resetPreviewImage();
        
        function openMenu() {
            if (isOpen || isAnimating) return;
            isAnimating = true;
            
            gsap.to(siteContainer, {
                duration: 0.8, rotate: -2, y: 32, x: -18, scale: 0.97,
                transformOrigin: "top right", ease: "power3.inOut", clearProps: "none"
            });
            
            animateMenuToggle(true);
            
            gsap.to(menuOverlay, {
                duration: 0.9, clipPath: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)",
                ease: "power4.inOut",
                onStart: () => {
                    menuOverlay.style.pointerEvents = "auto";
                    menuOverlay.classList.add('active');
                }
            });
            
            gsap.to(menuContent, {
                duration: 0.7, opacity: 1, y: 0, rotationX: 0, scale: 1,
                transformOrigin: "bottom left", ease: "back.out(0.5)", delay: 0.1
            });
            
            const allItems = [...menuLinks, ...socialLinks];
            gsap.to(allItems, {
                duration: 0.6, opacity: 1, y: "0%", stagger: 0.05, delay: 0.25, ease: "power3.out"
            });
            
            setTimeout(() => { isOpen = true; isAnimating = false; }, 900);
        }
        
        function closeMenu() {
            if (!isOpen || isAnimating) return;
            isAnimating = true;
            
            gsap.to(siteContainer, {
                duration: 0.8, rotate: 0, y: 0, x: 0, scale: 1, ease: "power3.inOut"
            });
            
            animateMenuToggle(false);
            
            const allItems = [...menuLinks, ...socialLinks];
            gsap.to(allItems, {
                duration: 0.4, opacity: 0, y: "120%", stagger: 0.03, ease: "power2.in"
            });
            
            gsap.to(menuContent, {
                duration: 0.6, opacity: 0, y: 48, rotationX: 5, scale: 0.96,
                transformOrigin: "bottom left", ease: "power2.in"
            });
            
            gsap.to(menuOverlay, {
                duration: 0.7, clipPath: "polygon(0% 0%, 0% 0%, 0% 0%, 0% 0%)",
                ease: "power4.inOut",
                onComplete: () => {
                    menuOverlay.style.pointerEvents = "none";
                    menuOverlay.classList.remove('active');
                    resetPreviewImage();
                    cleanupPreviewImages();
                    const imgs = document.querySelectorAll('#previewInner .preview-img');
                    if (imgs.length > 1) {
                        for(let i=0; i<imgs.length-1; i++) imgs[i].remove();
                    }
                }
            });
            
            setTimeout(() => {
                isOpen = false;
                isAnimating = false;
                gsap.set(allItems, { opacity: 0, y: '120%' });
            }, 800);
        }
        
        menuToggle.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (isAnimating) return;
            if (isOpen) closeMenu();
            else openMenu();
        });
        
        menuLinks.forEach(link => {
            link.addEventListener('mouseenter', function() {
                if (!isOpen || isAnimating) return;
                const imagePath = this.getAttribute('data-image');
                if (!imagePath) return;
                const allPreviews = document.querySelectorAll('#previewInner .preview-img');
                const lastImg = allPreviews[allPreviews.length - 1];
                if (lastImg && lastImg.src === imagePath) return;
                const newImg = document.createElement('img');
                newImg.classList.add('preview-img');
                newImg.src = imagePath;
                newImg.style.opacity = '0';
                newImg.style.transform = 'scale(1.08) rotate(2deg)';
                newImg.style.willChange = 'transform, opacity';
                previewInner.appendChild(newImg);
                cleanupPreviewImages();
                gsap.fromTo(newImg,
                    { opacity: 0, scale: 1.12, rotate: 3 },
                    { duration: 0.65, opacity: 1, scale: 1, rotate: 0, ease: "power2.out", overwrite: true }
                );
                if (allPreviews.length > 0) {
                    const prev = allPreviews[allPreviews.length - 2];
                    if (prev && prev !== newImg) {
                        gsap.to(prev, { duration: 0.4, opacity: 0.5, ease: "power1.out" });
                    }
                }
            });
        });
        
        menuOverlay.addEventListener('click', (e) => {
            if (isOpen && !isAnimating && e.target === menuOverlay) closeMenu();
        });
        
        gsap.set('#menuLabel', { opacity: 1, y: 0 });
        gsap.set('#closeLabel', { opacity: 0, y: 6, visibility: 'visible' });
        resetPreviewImage();
    })();
</script>
</body>
</html>
